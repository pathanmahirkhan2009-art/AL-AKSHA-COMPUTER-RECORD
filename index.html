<!DOCTYPE html>
<html lang="gu" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-AKSHA COMPUTER CENTRE || Record Register</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --bg-body: #eef2f7; --bg-card: #ffffff; --text-main: #333333; --border-color: #cbd5e1; --primary: #1a73e8; --head-bg: #e8f0fe; --input-bg: #ffffff; --live1: #1a73e8; --live2: #0d47a1; --live3: #00d2ff; --live4: #3a7bd5; }
        [data-theme="dark"] { --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #f1f1f1; --border-color: #333333; --primary: #bb86fc; --head-bg: #2c2c2c; --input-bg: #2a2a2a; }
        [data-theme="emerald"] { --bg-body: #f0fdf4; --bg-card: #ffffff; --text-main: #14532d; --border-color: #bbf7d0; --primary: #10b981; --head-bg: #dcfce7; --input-bg: #ffffff; }
        * { box-sizing: border-box; font-family: 'Noto Sans Gujarati', sans-serif; }
        body { background-color: var(--bg-body); margin: 0; padding: 0; color: var(--text-main); transition: 0.3s; position: relative; min-height: 100vh; }
        
        .full-live-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: linear-gradient(45deg, var(--live1), var(--bg-body), var(--live2)); background-size: 300% 300%; animation: FullScreenLive 10s ease infinite; opacity: 0.15; }
        @keyframes FullScreenLive { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 380px; }
        .login-box h2 { color: #1a73e8; font-size: 20px; font-weight: 800; margin-top: 0; margin-bottom: 25px; }
        .login-box input { padding: 12px; font-size: 16px; margin-top: 15px; width: 100%; color: #333; text-align: center; border: 2px solid #e0e0e0; border-radius: 8px; }
        .login-box button { background: linear-gradient(to right, #34a853, #2b8c45); color: white; border: none; padding: 12px 20px; font-size: 18px; margin-top: 25px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }

        #main-app { display: none; max-width: 1200px; margin: auto; padding: 20px; position: relative; z-index: 1;}
        .main-heading { text-align: center; color: white; font-size: 28px; font-weight: 800; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 25px; background: linear-gradient(270deg, var(--live1), var(--live2)); }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg-card); padding: 10px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 14px; background: var(--bg-body); border: 1px solid var(--border-color); font-weight: 700; cursor: pointer; border-radius: 8px; font-size: 15px; color: var(--text-main); transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; background: var(--bg-card); padding: 25px; border-radius: 12px; overflow-x: auto; border: 1px solid var(--border-color); }
        .tab-content.active { display: block; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { padding: 25px 20px; border-radius: 12px; text-align: center; color: white; font-size: 18px; font-weight: 700; position: relative; overflow: hidden; }
        .card i { position: absolute; font-size: 80px; opacity: 0.2; right: -10px; bottom: -10px; }
        .card span { font-size: 28px; display: block; margin-top: 8px; font-weight: 800; z-index: 2; }
        .c-cash { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .c-upi { background: linear-gradient(135deg, #2f80ed 0%, #56ccf2 100%); }
        .c-profit { background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%); color: #333; }
        .c-udhaar { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }

        .chart-container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .chart-box { flex: 1; min-width: 300px; background: var(--bg-body); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }

        .filter-section { background: var(--bg-body); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; border: 1px solid var(--border-color); }
        .filter-section label { font-weight: 800; color: var(--primary); }
        .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--primary); font-size: 16px; margin-bottom: 15px; background: var(--input-bg); color: var(--text-main); }

        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: var(--bg-body); padding: 20px; border-radius: 10px; }
        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 160px; }
        label { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--primary); }
        input, select { padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; background: var(--input-bg); color: var(--text-main); }
        .action-btn { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 700; padding: 12px 20px; border-radius: 6px; margin-top: 24px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; min-width: 800px; background: var(--bg-card); color: var(--text-main); }
        th, td { border-bottom: 1px solid var(--border-color); padding: 14px 12px; text-align: left; }
        th { background: var(--head-bg); color: var(--primary); font-weight: 800; }
        tr.hide-row { display: none; }

        .btn-sm { border: none; padding: 6px 10px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-right: 5px; color: white; }
        .btn-del { background: #ea4335; }
        .btn-wa { background: #25d366; }
        .btn-print { background: #607d8b; }
        
        #toast-box { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; font-size: 16px; font-weight: bold; transition: bottom 0.4s; z-index: 3000; }
        #toast-box.show { bottom: 30px; }
        .toast-success { background: linear-gradient(135deg, #34a853, #2b8c45) !important; }
        .toast-error { background: linear-gradient(135deg, #ea4335, #c5221f) !important; }

        .report-btn { padding: 15px 25px; border:none; border-radius: 8px; cursor:pointer; font-weight:bold; font-size: 16px; color: white; margin-right: 15px; margin-bottom: 15px; }
        .r-excel { background: linear-gradient(135deg, #34a853, #2b8c45); }
        .r-pdf { background: linear-gradient(135deg, #ea4335, #c5221f); }
        .r-tele { background: linear-gradient(135deg, #0088cc, #005f8e); }
    </style>
</head>
<body>

<div class="full-live-bg"></div>
<div id="toast-box"><i class="fas fa-info-circle"></i> <span id="toast-msg">Message</span></div>

<div id="login-screen">
    <div class="login-box">
        <h2>AL-AKSHA COMPUTER CENTRE<br><span style="font-size:14px; color:#555;">|| Record Register ||</span></h2>
        <input type="text" id="username-input" placeholder="Username (9638730186)">
        <input type="password" id="password-input" placeholder="Password">
        <button onclick="checkLogin()"><i class="fas fa-sign-in-alt"></i> લોગિન કરો</button>
    </div>
</div>

<div id="main-app">
    <div class="main-heading"><i class="fas fa-laptop-code"></i> AL-AKSHA COMPUTER CENTRE || Record</div>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('finance')"><i class="fas fa-wallet"></i> રોજનો હિસાબ</button>
        <button class="tab-btn" onclick="openTab('reports')"><i class="fas fa-chart-pie"></i> રિપોર્ટ અને બેકઅપ</button>
    </div>

    <div id="finance" class="tab-content active">
        <div class="filter-section">
            <div style="flex: 1; min-width: 250px;">
                <label><i class="far fa-calendar-alt"></i> મહિનો અને વર્ષ:</label>
                <select id="month-filter" onchange="renderFinance()" style="margin-left: 10px; padding:6px;"></select>
                <button onclick="fetchCloudData()" class="btn-sm" style="background:var(--primary); margin-left:10px; padding: 8px 12px;"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div style="flex: 1; min-width: 250px; text-align: right;">
                <label><i class="fas fa-paint-brush"></i> થીમ:</label>
                <select id="theme-selector" onchange="changeTheme()" style="margin-left: 10px; padding:6px;">
                    <option value="default">Default Blue</option>
                    <option value="dark">Dark Mode</option>
                    <option value="emerald">Emerald Green</option>
                </select>
            </div>
        </div>

        <div class="dashboard">
            <div class="card c-cash"><i class="fas fa-money-bill-wave"></i> રોકડ (Cash)<br>₹<span id="bal-cash">0</span></div>
            <div class="card c-upi"><i class="fas fa-qrcode"></i> ઓનલાઇન (UPI)<br>₹<span id="bal-upi">0</span></div>
            <div class="card c-profit"><i class="fas fa-chart-line"></i> નફો<br>₹<span id="bal-profit">0</span></div>
            <div class="card c-udhaar"><i class="fas fa-hand-holding-usd"></i> કુલ ઉધાર<br>₹<span id="bal-udhaar">0</span></div>
        </div>

        <div class="chart-container">
            <div class="chart-box"><canvas id="incomeExpenseChart"></canvas></div>
            <div class="chart-box"><canvas id="serviceChart"></canvas></div>
        </div>

        <form id="finance-form" class="form-row" onsubmit="addFinance(event)">
            <div class="form-group">
                <label>ઝડપી પસંદગી (Quick Select)</label>
                <select id="f-quick" onchange="autoFillFinance()">
                    <option value="">-- પસંદ કરો --</option>
                    <option value="પાનકાર્ડ|300|0">પાનકાર્ડ (300 Rs)</option>
                    <option value="ચૂંટણીકાર્ડ|200|0">ચૂંટણીકાર્ડ (200 Rs)</option>
                    <option value="આધારકાર્ડ (પ્રિન્ટ)|50|0">આધારકાર્ડ - પ્રિન્ટ (50 Rs)</option>
                    <option value="ઝેરોક્ષ|3|0">ઝેરોક્ષ (3 Rs)</option>
                </select>
            </div>
            <div class="form-group"><label>ગ્રાહકનું નામ</label><input type="text" id="f-desc" required></div>
            <div class="form-group"><label>પ્રકાર</label><select id="f-type"><option value="income">આવક</option><option value="expense">ખર્ચ</option><option value="udhaar">ઉધાર આપ્યા</option></select></div>
            <div class="form-group"><label>રીત</label><select id="f-mode"><option value="cash">રોકડ</option><option value="upi">UPI</option></select></div>
            <div class="form-group"><label>કુલ રકમ (₹)</label><input type="number" id="f-amount" required></div>
            <div class="form-group"><label>સરકારી ફી (₹)</label><input type="number" id="f-gov" value="0"></div>
            <button type="submit" class="action-btn"><i class="fas fa-cloud-upload-alt"></i> સેવ કરો</button>
        </form>

        <input type="text" id="search-bar" class="search-bar" onkeyup="searchTable()" placeholder="🔍 ગ્રાહકનું નામ શોધો...">

        <table id="main-table">
            <thead><tr><th>તારીખ</th><th>વિગત</th><th>પ્રકાર</th><th>રીત</th><th>રકમ</th><th>નફો</th><th>એક્શન</th></tr></thead>
            <tbody id="finance-table"></tbody>
        </table>
    </div>

    <div id="reports" class="tab-content">
        <h3><i class="fas fa-file-invoice"></i> બેકઅપ અને રિપોર્ટ</h3>
        <button onclick="exportExcel()" class="report-btn r-excel"><i class="fas fa-file-excel"></i> Excel Download</button>
        <button onclick="printReportPDF()" class="report-btn r-pdf"><i class="fas fa-file-pdf"></i> આ મહિનાનો PDF રિપોર્ટ</button>
    </div>
</div>

<script>
    // --- તમારી લિંક અહી મૂકો ---
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzkmrWPKrfRLa6Xn63bKhLopEG60bNB01k_SWI0-cWZZuaa4yr3-vPEDtoPgmIpyu1aMQ/exec";
    
    let db = { finance: [] };
    let myPieChart, myBarChart;

    function showToast(msg, type) {
        const t = document.getElementById('toast-box');
        const m = document.getElementById('toast-msg');
        t.className = type === 'success' ? 'toast-success show' : 'toast-error show';
        m.innerText = msg;
        setTimeout(() => { t.classList.remove('show'); }, 3000);
    }

    // બધી જ પ્રકારની તારીખ સેટ કરવા માટે મજબૂત ફંક્શન
    function fixDateStr(d) {
        if(!d) return "";
        let s = String(d).trim();
        if(s.includes('-') || s.includes('T')) {
            let dt = new Date(s);
            if(!isNaN(dt.getTime())) return ("0" + dt.getDate()).slice(-2) + "/" + ("0"+(dt.getMonth()+1)).slice(-2) + "/" + dt.getFullYear();
        }
        return s;
    }

    async function checkLogin() {
        let u = document.getElementById('username-input').value;
        let p = document.getElementById('password-input').value;
        if(u === '9638730186' && p === 'RECORD@2009') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showToast('લોગિન સફળ!', 'success');
            await fetchCloudData(); 
        } else { showToast('ખોટો પાસવર્ડ!', 'error'); }
    }

    async function fetchCloudData() {
        showToast('ડેટા લોડ થાય છે... ⏳', 'success');
        try {
            const response = await fetch(CLOUD_URL);
            const data = await response.json();
            
            db.finance = data.map(item => ({ ...item, date: fixDateStr(item.date) }));
            initFilter();
            renderFinance();
            showToast('ડેટા અપડેટ થઈ ગયો! ✅', 'success');
        } catch (e) {
            showToast('ડેટા લાવવામાં એરર! ❌', 'error');
        }
    }

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function initFilter() {
        const select = document.getElementById('month-filter');
        const months = ["જાન્યુઆરી", "ફેબ્રુઆરી", "માર્ચ", "એપ્રિલ", "મે", "જૂન", "જુલાઈ", "ઓગસ્ટ", "સપ્ટેમ્બર", "ઓક્ટોબર", "નવેમ્બર", "ડિસેમ્બર"];
        const now = new Date();
        const currentMonthYear = months[now.getMonth()] + " " + now.getFullYear();
        let options = [currentMonthYear];
        
        db.finance.forEach(item => {
            let s = String(item.date);
            if(s.includes('/')) {
                let parts = s.split('/');
                if(parts.length >= 3) {
                    let mIdx = parseInt(parts[1]) - 1;
                    if(mIdx >= 0 && mIdx <= 11) {
                        let label = months[mIdx] + " " + parts[2].substring(0,4);
                        if(!options.includes(label)) options.push(label);
                    }
                }
            }
        });
        
        select.innerHTML = '';
        options.forEach(opt => { select.innerHTML += `<option value="${opt}" ${opt === currentMonthYear ? 'selected' : ''}>${opt}</option>`; });
    }

    function autoFillFinance() {
        let v = document.getElementById('f-quick').value;
        if(v) {
            let [d, a, g] = v.split('|');
            document.getElementById('f-desc').value = d; document.getElementById('f-amount').value = a; document.getElementById('f-gov').value = g; document.getElementById('f-type').value = 'income';
        }
    }

    async function addFinance(e) {
        e.preventDefault();
        let today = new Date();
        let formattedDate = ("0" + today.getDate()).slice(-2) + "/" + ("0"+(today.getMonth()+1)).slice(-2) + "/" + today.getFullYear();

        const entry = { date: formattedDate, desc: document.getElementById('f-desc').value, type: document.getElementById('f-type').value, mode: document.getElementById('f-mode').value, amount: parseFloat(document.getElementById('f-amount').value), govFee: parseFloat(document.getElementById('f-gov').value) || 0 };
        
        showToast('ક્લાઉડમાં સેવ થાય છે... ⏳', 'success');
        db.finance.push(entry); document.getElementById('finance-form').reset(); initFilter(); renderFinance();

        try {
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            showToast('સેવ થઈ ગયું! ✅', 'success');
            setTimeout(fetchCloudData, 2000); 
        } catch(err) { showToast('સેવ એરર ❌', 'error'); }
    }

    function renderFinance() {
        const filterVal = document.getElementById('month-filter').value;
        const months = ["જાન્યુઆરી", "ફેબ્રુઆરી", "માર્ચ", "એપ્રિલ", "મે", "જૂન", "જુલાઈ", "ઓગસ્ટ", "સપ્ટેમ્બર", "ઓક્ટોબર", "નવેમ્બર", "ડિસેમ્બર"];
        let cash = 0, upi = 0, profit = 0, udhaar = 0;
        let tb = document.getElementById('finance-table');
        tb.innerHTML = ''; let chartData = { income: 0, expense: 0, profit: 0, services: {} };

        if (db.finance.length === 0) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center;">કોઈ એન્ટ્રી નથી / શીટ ખાલી છે.</td></tr>'; return; }

        db.finance.forEach((item, i) => {
            let s = String(item.date);
            if(s.includes('/')) {
                let parts = s.split('/');
                if(parts.length >= 3) {
                    let mIdx = parseInt(parts[1]) - 1;
                    if(mIdx >= 0 && mIdx <= 11) {
                        let itemMonthYear = months[mIdx] + " " + parts[2].substring(0,4);
                        if(itemMonthYear === filterVal) {
                            let p = (item.type === 'income') ? item.amount - item.govFee : 0;
                            if(item.type === 'income') { item.mode === 'cash' ? cash += item.amount : upi += item.amount; profit += p; chartData.income += item.amount; chartData.profit += p; chartData.services[item.desc] = (chartData.services[item.desc] || 0) + 1; }
                            else if(item.type === 'expense') { item.mode === 'cash' ? cash -= item.amount : upi -= item.amount; profit -= item.amount; chartData.expense += item.amount; }
                            else if(item.type === 'udhaar') { udhaar += item.amount; item.mode === 'cash' ? cash -= item.amount : upi -= item.amount; }
                            let typeColor = item.type === 'income' ? '#34a853' : (item.type === 'expense' ? '#ea4335' : '#f2994a');
                            tb.innerHTML += `<tr><td>${item.date}</td><td style="font-weight:bold;" class="search-target">${item.desc}</td><td style="color:${typeColor}; font-weight:bold;">${item.type}</td><td>${item.mode}</td><td>₹${item.amount}</td><td>₹${p}</td><td><button class="btn-sm btn-del" onclick="delRec(${i})"><i class="fas fa-trash"></i></button></td></tr>`;
                        }
                    }
                }
            }
        });
        
        document.getElementById('bal-cash').innerText = cash; document.getElementById('bal-upi').innerText = upi; document.getElementById('bal-profit').innerText = profit; document.getElementById('bal-udhaar').innerText = udhaar; updateCharts(chartData);
    }

    function searchTable() {
        let input = document.getElementById("search-bar").value.toLowerCase(); let rows = document.getElementById("finance-table").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) { let td = rows[i].getElementsByClassName("search-target")[0]; if (td) rows[i].classList.toggle("hide-row", td.innerText.toLowerCase().indexOf(input) === -1); }
    }

    function updateCharts(dataObj) {
        if(!dataObj) return;
        if(myBarChart) myBarChart.destroy();
        myBarChart = new Chart(document.getElementById('incomeExpenseChart').getContext('2d'), { type: 'bar', data: { labels: ['આવક', 'ખર્ચ', 'નફો'], datasets: [{ label: 'રકમ (₹)', data: [dataObj.income, dataObj.expense, dataObj.profit], backgroundColor: ['#34a853', '#ea4335', '#1a73e8'] }] } });
        if(myPieChart) myPieChart.destroy();
        myPieChart = new Chart(document.getElementById('serviceChart').getContext('2d'), { type: 'doughnut', data: { labels: Object.keys(dataObj.services), datasets: [{ data: Object.values(dataObj.services), backgroundColor: ['#1a73e8', '#34a853', '#fbbc05', '#ea4335'] }] } });
    }

    function delRec(i) { if(confirm('કાયમી ડીલીટ માટે Google Sheet માંથી લાઈન કાઢો. અત્યાર પૂરતું કાઢવું છે?')) { db.finance.splice(i, 1); renderFinance(); } }
    function exportExcel() { let csv = "\ufeffતારીખ,વિગત,પ્રકાર,રીત,રકમ\n"; db.finance.forEach(r => csv += `${r.date},${r.desc},${r.type},${r.mode},${r.amount}\n`); let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); let url = window.URL.createObjectURL(blob); let a = document.createElement('a'); a.href = url; a.download = 'Al_Aksha_Cloud_Report.csv'; a.click(); }
    function printReportPDF() { window.print(); }
</script>
